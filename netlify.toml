[build]
  publish = "html"
  command = ""

[[redirects]]
  from = "/css/*"
  to = "/css/:splat"
  status = 200

[[redirects]]
  from = "/js/*"
  to = "/js/:splat"
  status = 200

[[redirects]]
  from = "/images/*"
  to = "/images/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Asegurar que los archivos estáticos se sirvan correctamente
[[headers]]
  for = "/css/*"
  [headers.values]
    Content-Type = "text/css"

[[headers]]
  for = "/js/*"
  [headers.values]
    Content-Type = "application/javascript"